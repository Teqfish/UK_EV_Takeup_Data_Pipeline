services:
  postgres:
    image: postgres:15
    container_name: kestra_postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    ports:
      - "5433:5432"
    volumes:
      - kestra_postgres_data:/var/lib/postgresql/data

  kestra:
    build:
      context: .
      dockerfile: docker/kestra/Dockerfile
    container_name: kestra
    command: server standalone --flow-path=/app/flows
    user: "root"
    ports:
      - "8080:8080"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      UV_LINK_MODE: copy
      UV_CACHE_DIR: /app/storage/uv-cache
      UV_PROJECT_ENVIRONMENT: /app/storage/venvs/uk_ev_takeup
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra

        kestra:
          server:
            basic-auth:
              enabled: true
              username: kestra@kestra.com
              password: Kestra1234
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          taskRunner:
            type: io.kestra.plugin.core.runner.Process

    volumes:
      - ./:/app/UK_EV_Takeup_Data_Pipeline
      - ./kestra/flows:/app/flows
      - ~/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
      - ~/.dbt:/root/.dbt:ro
      - kestra_storage:/app/storage

    depends_on:
      - postgres

  streamlit:
    image: python:3.13-slim
    container_name: streamlit
    working_dir: /app/UK_EV_Takeup_Data_Pipeline
    ports:
      - "8501:8501"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      UV_LINK_MODE: copy
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/venvs/uk_ev_takeup_streamlit
    volumes:
      - ./:/app/UK_EV_Takeup_Data_Pipeline
      - ~/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
    command: >
      sh -c "
      pip install uv &&
      uv run streamlit run streamlit/app.py
      --server.address 0.0.0.0
      --server.port 8501
      "

volumes:
  kestra_postgres_data:
  kestra_storage:
