id: batch_uk_ev_pipeline
namespace: uk_ev_takeup

description: |
  #### === BATCH UK EV PIPELINE === ####
  Run the full source-by-source pipeline in sequence:
  1. FX
  2. electricity
  3. petroleum
  4. DVLA VEH1103
  5. DVLA VEH1153
  6. rebuild final marts
  7. test final marts

tasks:
  - id: ingest_bank_of_england_eur_gbp_fx
    type: io.kestra.plugin.core.flow.Subflow
    namespace: uk_ev_takeup
    flowId: ingest_bank_of_england_eur_gbp_fx
    wait: true
    transmitFailed: true

  - id: ingest_european_wholesale_electricity_prices
    type: io.kestra.plugin.core.flow.Subflow
    namespace: uk_ev_takeup
    flowId: ingest_european_wholesale_electricity_prices
    wait: true
    transmitFailed: true

  - id: ingest_desnz_petroleum_products_prices
    type: io.kestra.plugin.core.flow.Subflow
    namespace: uk_ev_takeup
    flowId: ingest_desnz_petroleum_products_prices
    wait: true
    transmitFailed: true

  - id: ingest_dvla_veh1103
    type: io.kestra.plugin.core.flow.Subflow
    namespace: uk_ev_takeup
    flowId: ingest_dvla_veh1103
    wait: true
    transmitFailed: true

  - id: ingest_dvla_veh1153
    type: io.kestra.plugin.core.flow.Subflow
    namespace: uk_ev_takeup
    flowId: ingest_dvla_veh1153
    wait: true
    transmitFailed: true

  - id: build_final_marts
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    description: |
      #### === BUILD FINAL MARTS === ####
      Rebuild dashboard-facing marts after all source subflows complete.
      This step also builds the missing intermediate models required by the final marts.
    commands:
      - cd /app/UK_EV_Takeup_Data_Pipeline/dbt/uk_ev_takeup
      - uv run dbt run --select int_fossil_electricity_ratio_quarterly int_transition_ratios_quarterly mart_energy_prices_quarterly mart_vehicle_registrations_new_by_fuel_group mart_vehicle_registrations_all_by_fuel_group mart_transition_ratios_quarterly mart_transition_scorecards

  - id: test_final_marts
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    description: |
      #### === TEST FINAL MARTS === ####
      Run dbt tests on the marts after the warehouse build completes.
    commands:
      - cd /app/UK_EV_Takeup_Data_Pipeline/dbt/uk_ev_takeup
      - uv run dbt test --select marts
