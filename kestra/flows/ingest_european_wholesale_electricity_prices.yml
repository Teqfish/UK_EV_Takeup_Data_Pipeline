id: ingest_european_wholesale_electricity_prices
namespace: uk_ev_takeup

description: |
  #### === INGEST EUROPEAN WHOLESALE ELECTRICITY PRICES === ####
  Run the electricity price slice:
  1. ingest the source file
  2. load the raw BigQuery table
  3. run the related dbt models

variables:
  repo_dir: /app/UK_EV_Takeup_Data_Pipeline

tasks:
  - id: run_electricity_ingestion
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    description: |
      #### === RUN INGESTION SCRIPT === ####
      Download the electricity price source, upload raw/prepared files to GCS,
      and clean up local temp files.
    commands:
      - cd {{ vars.repo_dir }}
      - uv run python ingestion/european_wholesale_electricity_prices.py

  - id: load_electricity_raw_bq
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    description: |
      #### === LOAD RAW BIGQUERY TABLE === ####
      Load the prepared electricity parquet from GCS into the raw BigQuery table.
    commands:
      - cd {{ vars.repo_dir }}
      - uv run python ingestion/bigquery/load_raw_european_wholesale_electricity_prices.py

  - id: run_dbt_electricity_models
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    description: |
      #### === RUN RELATED DBT MODELS === ####
      Build the electricity staging and intermediate models.
    commands:
      - cd {{ vars.repo_dir }}/dbt/uk_ev_takeup
      - uv run dbt run --select stg_european_wholesale_electricity_prices int_electricity_prices_gb_monthly int_electricity_prices_gb_quarterly
